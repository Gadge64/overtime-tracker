# Auto-deploy to Vercel production on every push to master.
# Requires VERCEL_TOKEN to be added as a GitHub Actions secret:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: VERCEL_TOKEN
#   Value: (your Vercel personal access token)

name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel production
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_fm1C6mSchnqvIuZuNdhNcxjk
          VERCEL_PROJECT_ID: prj_onOi2nSYPCwLf0uvekEdOcprOKCt
